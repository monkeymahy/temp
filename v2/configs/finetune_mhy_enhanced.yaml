seed_everything: 42

trainer:
  max_epochs: 160
  accelerator: gpu
  enable_checkpointing: true
  log_every_n_steps: 50
  deterministic: true
  num_sanity_val_steps: 0
  logger:
    class_path: swanlab.integration.pytorch_lightning.SwanLabLogger
    init_args:
      project: AAGNet_PL
      logdir: .\v2\output\swanlog
  callbacks:
    - class_path: v2.callbacks.EMA.EMACallback
      init_args:
        decay: 0.9516951530106196 # 0.5 ** (1 / 14)

    - class_path: lightning.pytorch.callbacks.StochasticWeightAveraging
      init_args:
        swa_epoch_start: 30
        swa_lrs: 0.001

    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val_seg_acc_avg
        mode: max
        save_top_k: 1
        dirpath: .\v2\output\checkpoints\finetune_mhy_enhanced
        filename: "{epoch}-{val_seg_acc_avg:.2f}"
        save_last: true
    
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val_seg_acc_avg
        mode: max
        patience: 10
        min_delta: 0.001

model:
  num_classes: 6
  arch: AAGNetGraphEncoder
  edge_attr_dim: 12
  node_attr_dim: 10
  edge_attr_emb: 256  
  node_attr_emb: 256  
  edge_grid_dim: 0
  node_grid_dim: 7
  edge_grid_emb: 0
  node_grid_emb: 256  
  num_layers: 8         
  delta: 2
  mlp_ratio: 8
  drop: 0.35
  drop_path: 0.35
  head_hidden_dim: 512
  conv_on_edge: true   
  use_uv_gird: true
  use_edge_attr: true
  use_face_attr: true
  lr: 1e-3
  weight_decay: 2e-2
  n_epochs: 160
  pretrained_ckpt: .\v2\output\checkpoints\pretrain_24_enhanced\epoch=24-val_seg_acc_avg=0.99.ckpt
  freeze_encoder: true
  unfreeze_at_epoch: 10

data:
  root_dir: .\v2\data\SFCAD16
  normalize: False
  center_and_scale: true
  random_rotate: True
  transform: null
  batch_size: 32
  drop_last: False
  num_workers: 4
  prefetch_factor: 4
  label_names:
    - slot groove
    - pocket
    - planar
    - hole
    - notch_chamfer
    - other
